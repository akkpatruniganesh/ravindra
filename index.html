<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravindra’s Living Light</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
}

/* HEADER */
.header{
padding:15px;
background:linear-gradient(90deg,#ff7e5f,#feb47b);
font-size:24px;
font-weight:bold;
}

/* NAVBAR */
.navbar{
display:flex;
align-items:center;
padding:10px;
background:#1e5a96;
}

.navbar a{
color:white;
margin-right:20px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

/* DROPDOWN */
.dropdown{position:relative;}

.dropdown-content{
display:none;
position:absolute;
background:white;
}

.dropdown-content a{
display:block;
padding:10px;
color:black;
}

.dropdown:hover .dropdown-content{
display:block;
}

/* SEARCH */
.search-box{
margin-left:auto;
}

.search-box input,
.search-box button{
padding:6px;
}

/* HERO */
.hero{
text-align:center;
padding:80px 20px;
}

/* SECTION */
.section{
display:none;
padding:20px;
}

/* CARD */
.card{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin-top:10px;
}

/* BLOG */
<!-- BLOG -->
<div class="section" id="blog">
<h2>📝 Blog</h2>

<!-- Categories -->
<div style="margin-bottom:20px;">
<button onclick="loadBlog('motivation')">💡 Motivational</button>
<button onclick="loadBlog('books')">📚 Book Reviews</button>
<button onclick="loadBlog('movies')">🎬 Movie Reviews</button>
<button onclick="loadBlog('ott')">📺 OTT Reviews</button>
<button onclick="loadBlog('travel')">✈️ Travel</button>
</div>

<!-- Blog Content -->
<div id="blog-content" class="blog-grid"></div>

</div>

<body>

<div class="header">Ravindra’s Living Light</div>

<div class="navbar">

<div class="dropdown">
<a onclick="showSection('movies')">🎬 Movies ▼</a>
<div class="dropdown-content">
<a onclick="showSection('movies')">English</a>
<a onclick="showSection('movies')">Hindi</a>
<a onclick="showSection('movies')">Telugu</a>
</div>
</div>

<a onclick="showSection('books')">📚 Books</a>
<a onclick="showSection('opinion')">💬 Opinion</a>
<a onclick="showSection('products')">🛍️ My Products</a>
<a onclick="showSection('blog')">📝 Blog</a>
<a onclick="showSection('maltin'); loadMaltinMovies()">⭐ Maltin Picks</a>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search movie">
<button onclick="searchMovie()">Search</button>
<button onclick="clearSearch()">Clear</button>
</div>

</div>

<!-- HERO -->
<div class="hero" id="home">
<h1>Ravindra’s Living Light</h1>
<p>A tribute through stories, movies, and knowledge</p>
</div>

<!-- SEARCH -->
<div class="section" id="search">
<h2>Search Results</h2>
<div id="search-list"></div>
</div>

<!-- MOVIES -->
<div class="section" id="movies">
<h2>Movies</h2>
<div class="card">Movie section</div>
</div>

<!-- BOOKS -->
<div class="section" id="books">
<h2>Books</h2>
<div class="card">The Alchemist</div>
</div>

<!-- OPINION -->
<div class="section" id="opinion">
<h2>Opinion</h2>
<div class="card">Share your thoughts...</div>
</div>

<!-- PRODUCTS -->
<div class="section" id="products">
<h2>My Products</h2>
<div class="card">Coming soon...</div>
</div>

<!-- BLOG -->
<div class="section" id="blog">
<h2>📝 Blog</h2>

<div class="blog-grid">
<div class="blog-card">
<h3>Inception Review</h3>
<p>A masterpiece of dreams and reality...</p>
</div>

<div class="blog-card">
<h3>The Alchemist</h3>
<p>A story about following your dreams...</p>
</div>

<div class="blog-card">
<h3>Stay Strong</h3>
<p>Life teaches us strength...</p>
</div>
</div>
</div>

<!-- MALTIN -->
<div class="section" id="maltin">
<h2>⭐ Leonard Maltin Recommendations</h2>
<div id="maltin-list"></div>
</div>

<script>

// NAVIGATION
function showSection(sectionId){
document.getElementById("home").style.display="none";

const sections=document.querySelectorAll('.section');
sections.forEach(sec=>sec.style.display='none');

document.getElementById(sectionId).style.display='block';
window.scrollTo(0,100);
}

// SEARCH (MULTIPLE MOVIES)
function searchMovie(){

const movie=document.getElementById("searchInput").value.trim();
const container=document.getElementById("search-list");

if(!movie) return;

showSection('search');
container.innerHTML="Loading...";

fetch(`https://www.omdbapi.com/?s=${movie}&apikey=aa1237e2`)
.then(res=>res.json())
.then(data=>{

if(data.Response==="True"){
container.innerHTML="";

data.Search.forEach(item=>{
container.innerHTML+=`
<div class="card">
<h3>${item.Title}</h3>
<p>${item.Year}</p>
</div>`;
});

}else{
container.innerHTML="No movies found ❌";
}

});

}

// CLEAR SEARCH
function clearSearch(){
document.getElementById("searchInput").value="";
document.getElementById("search-list").innerHTML="";
}

// MALTIN MOVIES
function loadMaltinMovies(){

const container=document.getElementById("maltin-list");

const movies=[
"Inception",
"Casablanca",
"The Godfather",
"Citizen Kane",
"Pulp Fiction"
];

container.innerHTML="";

movies.forEach(movie=>{

fetch(`https://www.omdbapi.com/?t=${movie}&apikey=aa1237e2`)
.then(res=>res.json())
.then(data=>{

if(data.Response==="True"){
container.innerHTML+=`
<div class="card">
<h3>${data.Title}</h3>
<p><strong>IMDb:</strong> ${data.imdbRating}</p>
<p>${data.Plot}</p>
</div>`;
}

});

});

}

</script>

</body>
</html>
