<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravindra Phonex</title>

<style>
body { margin:0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); color:#222; }

/* Top Header */
.header { display:flex; align-items:center; padding:15px 20px; background: linear-gradient(90deg, #ff7e5f, #feb47b); color:white; font-size:28px; font-weight:bold; }

.logo {
  font-size:28px;
  font-weight:bold;
}

/* Navbar */
.navbar { display:flex; align-items:center; padding:10px 20px; background: linear-gradient(90deg, #43cea2, #185a9d); color:white; }

.navbar a { color:white; margin-right:20px; text-decoration:none; font-weight:bold; }

/* Dropdown */
.dropdown { position:relative; }
.dropdown-content {
  display: none;
  position: absolute;
  background: #ffffff;
  min-width: 150px;
  top: 100%;
  left: 0;
  border: 1px solid #ddd;
  z-index: 1000;
}

.dropdown:hover .dropdown-content {
  display: block;
}
.dropdown-content a { display:block; padding:10px; color:#222; }
.dropdown-content { display:none; }
.dropdown-content.show { display:block; }

/* Search */
.search-box { margin-left:auto; }
.search-box input { padding:6px; }
.search-box button { padding:6px; }

.section { padding:20px; }
.card { background:white; padding:15px; border-radius:12px; margin-top:10px; box-shadow:0 4px 10px rgba(0,0,0,0.2); transition: transform 0.2s; }
.card:hover { transform: scale(1.03); }

img { max-width:100%; border-radius:8px; }
</style>
</head>

<body>

<!-- Header -->
<div class="header">
  <div class="logo">Ravindra Phonex</div>
</div>

<!-- Navbar -->
<div class="navbar">

  <div class="dropdown">
    <a href="#" onclick="toggleMenu(event)">Movies ▼</a>
    <div class="dropdown-content" id="movieMenu">
      <a href="#" onclick="event.stopPropagation()">English</a>
      <a href="#" onclick="event.stopPropagation()">Hindi</a>
      <a href="#" onclick="event.stopPropagation()">Telugu</a>
    </div>
  </div>
  </div>

  <a href="#books">Books</a>
  <a href="#opinion">Opinion</a>
  <a href="#products">My Products</a>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search movie">
    <button onclick="searchMovie()">Search</button>
    <button onclick="clearSearch()">Clear</button>
  </div>
</div>

<!-- Search Section -->
<div class="section" id="search">
  <h2>Search Results</h2>
  <div id="search-list"></div>
</div>

<!-- Books -->
<div class="section" id="books">
  <h2>Books</h2>
  <div class="card">The Alchemist</div>
</div>

<!-- Opinion -->
<div class="section" id="opinion">
  <h2>Opinion</h2>
  <div class="card">Share your thoughts...</div>
</div>

<!-- Products -->
<div class="section" id="products">
  <h2>My Products</h2>
  <div class="card">Coming soon...</div>
</div>

<script>
function searchMovie() {
  const movie = document.getElementById("searchInput").value.trim();
  const container = document.getElementById("search-list");

  if (!movie) return;

  container.innerHTML = "Loading...";

  const cbName = "search_cb_" + Date.now();

  window[cbName] = function(data) {
    if (data && data.Response === "True") {
      container.innerHTML = `
        <div class="card">
          <img src="${data.Poster}" />
          <h3>${data.Title}</h3>
          <p><strong>IMDb:</strong> ${data.imdbRating}</p>
          <p>${data.Plot}</p>
        </div>
      `;
    } else {
      container.innerHTML = "Movie not found ❌";
    }
    delete window[cbName];
  };

  const script = document.createElement("script");
  script.src = `https://www.omdbapi.com/?t=${encodeURIComponent(movie)}&apikey=aa1237e2&callback=${cbName}`;
  document.body.appendChild(script);
}

function clearSearch() {
  document.getElementById("searchInput").value = "";
  document.getElementById("search-list").innerHTML = "";
}

function toggleMenu(e) {
  e.preventDefault();
  const menu = document.getElementById("movieMenu");
  menu.classList.toggle("show");
}

// close dropdown when clicking outside
document.addEventListener("click", function(e) {
  const menu = document.getElementById("movieMenu");
  if (!e.target.closest(".dropdown")) {
    menu.classList.remove("show");
  }
});

</script>

</body>
</html>
