<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravindra Phonex</title>

<style>
body { margin:0; font-family: Arial, sans-serif; background:#0b0b0b; color:white; }

/* Top Header */
.header {
  display:flex;
  align-items:center;
  padding:10px 20px;
  background:black;
  border-bottom:1px solid #222;
}

.logo {
  font-size:28px;
  font-weight:bold;
}

/* Navbar */
.navbar {
  display:flex;
  align-items:center;
  padding:10px 20px;
  background:#111;
}

.navbar a {
  color:white;
  margin-right:20px;
  text-decoration:none;
  font-weight:bold;
}

/* Dropdown */
.dropdown { position:relative; }
.dropdown-content {
  display:none;
  position:absolute;
  background:#222;
  min-width:150px;
  top:30px;
}
.dropdown-content a {
  display:block;
  padding:10px;
  color:white;
}
.dropdown:hover .dropdown-content { display:block; }

/* Search */
.search-box { margin-left:auto; }
.search-box input { padding:6px; }
.search-box button { padding:6px; }

.section { padding:20px; }
.card {
  background:#1e1e1e;
  padding:15px;
  border-radius:8px;
  margin-top:10px;
}

img { max-width:100%; border-radius:8px; }
</style>
</head>

<body>

<!-- Header -->
<div class="header">
  <div class="logo">Ravindra Phonex</div>
</div>

<!-- Navbar -->
<div class="navbar">

  <div class="dropdown">
    <a href="#">Movies ▼</a>
    <div class="dropdown-content">
      <a href="#">English</a>
      <a href="#">Hindi</a>
      <a href="#">Telugu</a>
    </div>
  </div>

  <a href="#books">Books</a>
  <a href="#opinion">Opinion</a>
  <a href="#products">My Products</a>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search movie">
    <button onclick="searchMovie()">Search</button>
    <button onclick="clearSearch()">Clear</button>
  </div>
</div>

<!-- Search Section -->
<div class="section" id="search">
  <h2>Search Results</h2>
  <div id="search-list"></div>
</div>

<!-- Books -->
<div class="section" id="books">
  <h2>Books</h2>
  <div class="card">The Alchemist</div>
</div>

<!-- Opinion -->
<div class="section" id="opinion">
  <h2>Opinion</h2>
  <div class="card">Share your thoughts...</div>
</div>

<!-- Products -->
<div class="section" id="products">
  <h2>My Products</h2>
  <div class="card">Coming soon...</div>
</div>

<script>
function searchMovie() {
  const movie = document.getElementById("searchInput").value.trim();
  const container = document.getElementById("search-list");

  if (!movie) return;

  container.innerHTML = "Loading...";

  const cbName = "search_cb_" + Date.now();

  window[cbName] = function(data) {
    if (data && data.Response === "True") {
      container.innerHTML = `
        <div class="card">
          <img src="${data.Poster}" />
          <h3>${data.Title}</h3>
          <p><strong>IMDb:</strong> ${data.imdbRating}</p>
          <p>${data.Plot}</p>
        </div>
      `;
    } else {
      container.innerHTML = "Movie not found ❌";
    }
    delete window[cbName];
  };

  const script = document.createElement("script");
  script.src = `https://www.omdbapi.com/?t=${encodeURIComponent(movie)}&apikey=aa1237e2&callback=${cbName}`;
  document.body.appendChild(script);
}

function clearSearch() {
  document.getElementById("searchInput").value = "";
  document.getElementById("search-list").innerHTML = "";
}
</script>

</body>
</html>
