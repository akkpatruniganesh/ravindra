<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravindra’s Living Light</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
}

.header {
  padding:15px 20px;
  background: linear-gradient(90deg,#ff7e5f,#feb47b);
  color:white;
  font-size:26px;
  font-weight:bold;
}

.navbar {
  display:flex;
  align-items:center;
  padding:10px 20px;
  background: linear-gradient(90deg,#43cea2,#185a9d);
}

.navbar a {
  color:white;
  margin-right:20px;
  text-decoration:none;
  font-weight:bold;
}

.dropdown { position:relative; }

.dropdown-content {
  display:none;
  position:absolute;
  top:100%;
  background:white;
  min-width:150px;
}

.dropdown-content a {
  display:block;
  padding:10px;
  color:black;
}

.dropdown:hover .dropdown-content {
  display:block;
}

.search-box {
  margin-left:auto;
}

.search-box input,
.search-box button {
  padding:6px;
}

.section {
  padding:20px;
  color:white;
}

.card {
  background:white;
  color:black;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">Ravindra’s Living Light</div>

<div class="navbar">
  <div class="dropdown">
    <a href="#">🎬 Movies ▼</a>
    <div class="dropdown-content">
      <a href="#" onclick="loadMovies('english')">English</a>
      <a href="#" onclick="loadMovies('hindi')">Hindi</a>
      <a href="#" onclick="loadMovies('telugu')">Telugu</a>
    </div>
  </div>

  <a href="#books">📚 Books</a>
  <a href="#opinion">💬 Opinion</a>
  <a href="#products">🛍️ My Products</a>
  <a href="#blog">📝 Blog</a>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search movie">
    <button onclick="searchMovie()">Search</button>
    <button onclick="clearSearch()">Clear</button>
  </div>
</div>

<!-- Movies -->
<div class="section" id="movies">
  <h2>Movies</h2>
  <div id="movies-list"></div>
</div>

<!-- Search -->
<div class="section" id="search">
  <h2>Search Results</h2>
  <div id="search-list"></div>
</div>

<!-- Books -->
<div class="section" id="books">
  <h2>Books</h2>
  <div class="card">The Alchemist</div>
</div>

<!-- Opinion -->
<div class="section" id="opinion">
  <h2>Opinion</h2>
  <div class="card">Share your thoughts...</div>
</div>

<!-- Products -->
<div class="section" id="products">
  <h2>My Products</h2>
  <div class="card">Coming soon...</div>
</div>

<!-- BLOG SECTION -->
<div class="section" id="blog">
  <h2>📝 Blog</h2>

  <!-- Blog Search -->
  <div style="margin-bottom:15px;">
    <input type="text" id="blogSearch" placeholder="Search blog..." style="padding:8px; width:250px;">
    <button onclick="searchBlog()">Search</button>
    <button onclick="clearBlogSearch()">Clear</button>
  </div>

  <!-- Categories -->
  <div style="margin-bottom:20px;">
    <button onclick="loadBlogCategory('movies')">🎬 Movies</button>
    <button onclick="loadBlogCategory('books')">📚 Books</button>
    <button onclick="loadBlogCategory('ott')">📺 OTT Reviews</button>
    <button onclick="loadBlogCategory('motivation')">💡 Motivation</button>
  </div>

  <!-- Blog Content -->
  <div id="blog-content"></div>
</div>

<script>
// MOVIE SEARCH
function searchMovie() {
  const movie = document.getElementById("searchInput").value.trim();
  const container = document.getElementById("search-list");

  if (!movie) return;

  container.innerHTML = "Loading...";

  const cb = "search_" + Date.now();

  window[cb] = function(data) {
    if (data && data.Response === "True") {
      container.innerHTML = `
        <div class="card">
          <h3>${data.Title}</h3>
          <p><strong>IMDb:</strong> ${data.imdbRating}</p>
          <p>${data.Plot}</p>
        </div>`;
    } else {
      container.innerHTML = "Movie not found ❌";
    }
  };

  const script = document.createElement("script");
  script.src = `https://www.omdbapi.com/?t=${movie}&apikey=aa1237e2&callback=${cb}`;
  document.body.appendChild(script);
}

// CLEAR SEARCH
function clearSearch() {
  document.getElementById("searchInput").value = "";
  document.getElementById("search-list").innerHTML = "";
}

// LOAD MOVIES
function loadMovies(lang) {
  const container = document.getElementById("movies-list");

  const movies = {
    english: ["Inception","Interstellar","Avatar"],
    hindi: ["Dangal","3 Idiots","PK"],
    telugu: ["RRR","Baahubali","Pushpa"]
  };

  container.innerHTML = "";

  movies[lang].forEach((m,i)=>{
    const cb = "cb_"+lang+i;

    window[cb] = function(data){
      if(data && data.Response==="True"){
        container.innerHTML += `
          <div class="card">
            <h3>${data.Title}</h3>
            <p><strong>IMDb:</strong> ${data.imdbRating}</p>
          </div>`;
      }
    };

    const script = document.createElement("script");
    script.src = `https://www.omdbapi.com/?t=${m}&apikey=aa1237e2&callback=${cb}`;
    document.body.appendChild(script);
  });

  document.getElementById("movies").scrollIntoView({behavior:"smooth"});
}

// BLOG DATA
const blogData = {
  movies: [
    { title: "Inception Review", content: "A masterpiece by Christopher Nolan." },
    { title: "Interstellar Thoughts", content: "A journey beyond time and space." }
  ],
  books: [
    { title: "The Alchemist", content: "A story about following your dreams." }
  ],
  ott: [
    { title: "Top Netflix Series", content: "Best shows to binge watch." }
  ],
  motivation: [
    { title: "Stay Strong", content: "Life teaches us through experiences." }
  ]
};

// LOAD BLOG CATEGORY
function loadBlogCategory(category) {
  const container = document.getElementById("blog-content");
  container.innerHTML = "";

  blogData[category].forEach(post => {
    container.innerHTML += `
      <div class="card">
        <h3>${post.title}</h3>
        <p>${post.content}</p>
      </div>
    `;
  });
}

// SEARCH BLOG
function searchBlog() {
  const query = document.getElementById("blogSearch").value.toLowerCase();
  const container = document.getElementById("blog-content");
  container.innerHTML = "";

  Object.values(blogData).flat().forEach(post => {
    if (post.title.toLowerCase().includes(query)) {
      container.innerHTML += `
        <div class="card">
          <h3>${post.title}</h3>
          <p>${post.content}</p>
        </div>
      `;
    }
  });
}

// CLEAR BLOG SEARCH
function clearBlogSearch() {
  document.getElementById("blogSearch").value = "";
  document.getElementById("blog-content").innerHTML = "";
}
</script>

</body>
</html>
