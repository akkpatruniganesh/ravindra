<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravindra Phonex</title>

<style>
body { margin:0; font-family: Arial, sans-serif; background: linear-gradient(135deg,#667eea,#764ba2); }

/* Header */
.header {
  padding:15px 20px;
  background: linear-gradient(90deg,#ff7e5f,#feb47b);
  color:white;
  font-size:26px;
  font-weight:bold;
}

/* Navbar */
.navbar {
  display:flex;
  align-items:center;
  padding:10px 20px;
  background: linear-gradient(90deg,#43cea2,#185a9d);
}

.navbar a {
  position:relative;
  color:white;
  margin-right:20px;
  text-decoration:none;
  font-weight:bold;
  padding-bottom:5px;
}

/* underline animation */
.navbar a::after {
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  left:0;
  bottom:0;
  background:#ffcc00;
  transition:0.3s;
}

.navbar a:hover::after { width:100%; }

/* Dropdown */
.dropdown { position:relative; }
.dropdown-content {
  display:none;
  position:absolute;
  top:100%;
  left:0;
  background:white;
  min-width:150px;
  border-radius:5px;
}
.dropdown-content a {
  display:block;
  padding:10px;
  color:black;
}
.dropdown:hover .dropdown-content { display:block; }

/* Search */
.search-box { margin-left:auto; }
.search-box input { padding:6px; }
.search-box button { padding:6px; }

/* Sections */
.section { padding:20px; color:white; }
.card {
  background:white;
  color:black;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">Ravindra Phonex</div>

<div class="navbar">
  <div class="dropdown">
    <a href="#">🎬 Movies ▼</a>
    <div class="dropdown-content">
      <a href="#" onclick="loadMovies('english')">English</a>
      <a href="#" onclick="loadMovies('hindi')">Hindi</a>
      <a href="#" onclick="loadMovies('telugu')">Telugu</a>
    </div>
  </div>
  </div>

  <a href="#books">📚 Books</a>
  <a href="#opinion">💬 Opinion</a>
  <a href="#products">🛍️ My Products</a>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search movie">
    <button onclick="searchMovie()">Search</button>
    <button onclick="clearSearch()">Clear</button>
  </div>
</div>

<div class="section" id="movies">
  <h2>Movies</h2>
  <div id="movies-list"></div>
</div>

<div class="section" id="search">
  <h2>Search Results</h2>
  <div id="search-list"></div>
</div>

<div class="section" id="books">
  <h2>Books</h2>
  <div class="card">The Alchemist</div>
</div>

<div class="section" id="opinion">
  <h2>Opinion</h2>
  <div class="card">Share your thoughts...</div>
</div>

<div class="section" id="products">
  <h2>My Products</h2>
  <div class="card">Coming soon...</div>
</div>

<script>
function searchMovie() {
  const movie = document.getElementById("searchInput").value.trim();
  const container = document.getElementById("search-list");

  if (!movie) return;

  container.innerHTML = "Loading...";

  const cbName = "search_" + Date.now();

  window[cbName] = function(data) {
    if (data && data.Response === "True") {
      container.innerHTML = `
        <div class="card">
          <img src="${data.Poster}" />
          <h3>${data.Title}</h3>
          <p><strong>IMDb:</strong> ${data.imdbRating}</p>
          <p>${data.Plot}</p>
        </div>
      `;
    } else {
      container.innerHTML = "Movie not found ❌";
    }
    delete window[cbName];
  };

  const script = document.createElement("script");
  script.src = `https://www.omdbapi.com/?t=${encodeURIComponent(movie)}&apikey=aa1237e2&callback=${cbName}`;
  document.body.appendChild(script);
}

function clearSearch() {
  document.getElementById("searchInput").value = "";
  document.getElementById("search-list").innerHTML = "";
}

// Load Movies by Language
function loadMovies(lang) {
  const container = document.getElementById("movies-list");
  container.innerHTML = "Loading...";

  const movieSets = {
    english: ["Inception","Interstellar","Avatar"],
    hindi: ["Dangal","3 Idiots","PK"],
    telugu: ["RRR","Baahubali","Pushpa"]
  };

  container.innerHTML = "";

  movieSets[lang].forEach((movie,i) => {
    const cb = "cb_"+lang+i;

    window[cb] = function(data){
      if(data && data.Response === "True"){
        container.innerHTML += `
          <div class="card">
            <img src="${data.Poster}" />
            <h3>${data.Title}</h3>
            <p><strong>IMDb:</strong> ${data.imdbRating}</p>
          </div>
        `;
      }
    };

    const script = document.createElement("script");
    script.src = `https://www.omdbapi.com/?t=${encodeURIComponent(movie)}&apikey=aa1237e2&callback=${cb}`;
    document.body.appendChild(script);
  });

  document.getElementById("movies").scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
